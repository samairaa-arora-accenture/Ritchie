<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#F8F8F6"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="800" fill="#FFFFFF" />
  <rect x="12" y="40" width="10" height="40" fill="#E6A756" rx="4"/>
  <text x="36" y="70" font-family="Segoe UI, sans-serif" font-size="18" fill="#1F2937">Dashboard</text>

  <!-- Header -->
  <rect x="220" y="0" width="980" height="80" fill="#FFFFFF" />
  <text x="240" y="48" font-family="Segoe UI, sans-serif" font-size="28" fill="#1F2937">Hello, Samaira</text>

  <!-- Hero card -->
  <rect x="240" y="100" width="920" height="140" rx="10" fill="#FFFFFF" stroke="#E6A756" stroke-width="1"/>
  <text x="260" y="140" font-family="Segoe UI, sans-serif" font-size="20" fill="#6B7280">Portfolio insight: Your investments are up</text>

  <!-- Summary cards -->
  <g font-family="Segoe UI, sans-serif">
    <rect x="240" y="260" width="160" height="100" rx="8" fill="#FFFFFF" stroke="#E6A756"/>
    <rect x="412" y="260" width="160" height="100" rx="8" fill="#FFFFFF" stroke="#5B8DEF"/>
    <rect x="584" y="260" width="160" height="100" rx="8" fill="#FFFFFF" stroke="#F3C969"/>
    <rect x="756" y="260" width="160" height="100" rx="8" fill="#FFFFFF" stroke="#57B894"/>
    <rect x="928" y="260" width="232" height="100" rx="8" fill="#FFFFFF" stroke="#9B7EDE"/>
    <text x="260" y="300" font-size="14" fill="#1F2937">Total assets</text>
    <text x="260" y="320" font-size="18" font-weight="600" fill="#1F2937">$12,345</text>
  </g>

  <!-- Charts row -->
  <rect x="240" y="380" width="560" height="260" rx="8" fill="#FFFFFF" stroke="#56B7B1"/>
  <rect x="820" y="380" width="340" height="120" rx="8" fill="#FFFFFF" stroke="#5B8DEF"/>
  <rect x="820" y="510" width="340" height="130" rx="8" fill="#FFFFFF" stroke="#E6A756"/>

  <!-- Footer mock -->
  <text x="240" y="720" font-family="Segoe UI, sans-serif" font-size="12" fill="#6B7280">© Richie — mockup</text>
</svg>
